name: Build out.json

on:
  push:
    branches: [ main ]   # или ваша основная ветка
  pull_request:
    branches: [ main ]
  # Можно добавить ручной запуск:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run build script
        run: node build.js

      - name: Commit and push if out.json changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add out.json
          # Проверяем, есть ли изменения
          if git diff --staged --quiet; then
            echo "Нет изменений в out.json"
          else
            git commit -m "Автоматическая сборка out.json"
            git push
          fi
